# 北京时间上午多时段重试 + 仓库内日期标记去重：每天只向飞书成功推送一次，降低 GitHub 单次 schedule 漏跑的影响。
name: Feishu daily news brief

permissions:
  contents: write

on:
  schedule:
    - cron: "0 2 * * *"
    - cron: "15 2 * * *"
    - cron: "30 2 * * *"
    - cron: "45 2 * * *"
    - cron: "0 3 * * *"
    - cron: "30 3 * * *"
    - cron: "0 4 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [daily]

concurrency:
  group: feishu-news-brief
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_CI_DEDUP: "1"
        run: python -u news_bot.py
