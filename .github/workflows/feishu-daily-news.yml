# 每日北京时间 10:00 推送（UTC 02:00）。不依赖本机开机。
# 说明：GitHub 对 schedule 可能晚跑、漏跑；可用 repository_dispatch 由外部定时器触发作为兜底。
name: Feishu daily news brief

permissions:
  contents: read

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [daily]

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python -u news_bot.py
